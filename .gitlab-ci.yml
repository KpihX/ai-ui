stages:
  - lint
  - sync

# Vérifier la validité du fichier docker-compose
lint_docker:
  stage: lint
  image: docker:latest
  script:
    - docker compose config -q
  only:
    - main

# Synchroniser vers GitHub
sync_github:
  stage: sync
  variables:
    GITHUB_USER: "kpihx"
    REPO_NAME: "ai-ui"
  only:
    - main
  script:
    - echo "🔍 Vérification/Création du repo sur GitHub..."
    - |
      curl -H "Authorization: token ${GITHUB_TOKEN}" \
           -X POST \
           -d "{\"name\":\"${REPO_NAME}\", \"private\":false}" \
           https://api.github.com/orgs/${GITHUB_ORG}/repos || true
    
    - echo "🔄 Synchronisation..."
    - git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${REPO_NAME}.git || git remote set-url github https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${REPO_NAME}.git
    
    - git push github $CI_COMMIT_SHA:refs/heads/main --force
